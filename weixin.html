<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信聊天记录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Helvetica Neue", "Microsoft YaHei", sans-serif;
            background: #e5e5e5;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .wechat-container {
            width: 375px;
            height: 667px;
            background: #f0f0f0;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            overflow: hidden;
            position: relative;
        }
        .wechat-header {
            background: #2d2d2d;
            color: white;
            text-align: center;
            padding: 15px 0;
            font-size: 17px;
            font-weight: 500;
        }
        .chat-bg {
            background: #ebebeb;
            height: calc(100% - 50px);
            padding: 15px 12px;
            overflow-y: auto;
        }
        .chat-time {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-bottom: 15px;
        }
        .message {
            display: flex;
            margin-bottom: 15px;
            align-items: flex-end;
        }
        .message-right {
            justify-content: flex-end;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            background: #ccc;
            flex-shrink: 0;
        }
        .avatar-left {
            margin-right: 8px;
            background: #666;
        }
        .avatar-right {
            margin-left: 8px;
            background: #07c160;
        }
        .bubble {
            max-width: 220px;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
            word-break: break-all;
        }
        .bubble-left {
            background: white;
            color: #333;
        }
        .bubble-right {
            background: #07c160;
            color: white;
        }
        .location-box {
            background: white;
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 14px;
            color: #007aff;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .location-box:before {
            content: "📍";
        }
    </style>
</head>
<body>

<div class="wechat-container">
    <div class="wechat-header">沈夜</div>
    <div class="chat-bg">
        <div class="chat-time">2019年5月12日</div>

        <!-- 右侧：挑衅 -->
        <div class="message message-right">
            <div class="bubble bubble-right">沈夜，你不是挺能替她出头吗？明天晚上来城南废弃工厂，我们单挑。不敢来就别装。</div>
            <div class="avatar avatar-right"></div>
        </div>

        <!-- 左侧：应战 -->
        <div class="message">
            <div class="avatar avatar-left"></div>
            <div class="bubble bubble-left">你以为我怕你？</div>
        </div>

        <!-- 右侧：放狠话 + 定位 -->
        <div class="message message-right">
            <div class="bubble bubble-right" style="margin-bottom:6px;">来就对了。我让你知道多管闲事的下场。</div>
            <div class="avatar avatar-right"></div>
        </div>
        <div class="message message-right">
            <div class="location-box">城南废弃工厂</div>
            <div class="avatar avatar-right" style="opacity:0;"></div>
        </div>

    </div>
</div>

</body>
</html>
