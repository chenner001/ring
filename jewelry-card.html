<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>珠宝定制单 · 晚香珠宝定制中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
        }

        .receipt {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 40px 35px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            position: relative;
        }

        .receipt-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .shop-name {
            font-size: 22px;
            font-weight: bold;
            color: #2d2d2d;
            letter-spacing: 2px;
        }

        .shop-sub {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }

        .receipt-title {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin: 10px 0 25px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .line {
            display: flex;
            margin-bottom: 16px;
            font-size: 15px;
        }

        .line-label {
            width: 90px;
            font-weight: 500;
            color: #555;
        }

        .line-text {
            color: #222;
            font-weight: 400;
            border-bottom: 1px solid #eee;
            flex: 1;
            padding-bottom: 2px;
        }

        .remark {
            margin-top: 25px;
            padding: 15px;
            background: #fafafa;
            border-left: 3px solid #c9a87b;
            font-size: 14px;
            color: #444;
        }

        .remark strong {
            color: #c9a87b;
        }

        .footer {
            margin-top: 35px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #777;
        }

        .stamp {
            color: #b89269;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="receipt">
    <div class="receipt-header">
        <div class="shop-name">晚香珠宝定制中心</div>
        <div class="shop-sub">高端珠宝 · 私人定制 · 终身保养</div>
    </div>

    <div class="receipt-title">珠宝定制单据</div>

    <div class="line">
        <div class="line-label">定制时间：</div>
        <div class="line-text">2018.12.25</div>
    </div>
    <div class="line">
        <div class="line-label">定制人：</div>
        <div class="line-text">苏晚</div>
    </div>
    <div class="line">
        <div class="line-label">定制物品：</div>
        <div class="line-text">素圈银色戒指</div>
    </div>
    <div class="line">
        <div class="line-label">内刻文字：</div>
        <div class="line-text">SS</div>
    </div>
    <div class="line">
        <div class="line-label">定制数量：</div>
        <div class="line-text">2 枚</div>
    </div>

    <div class="remark">
        <strong>备注要求：</strong><br>
        两枚戒指款式、尺寸、材质、内刻文字完全一致，无任何差异，成对制作。
    </div>

    <div class="footer">
        <div></div>
        <div class="stamp">已完成 · 已取件</div>
    </div>
</div>

</body>
</html>
