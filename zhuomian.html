<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>桌面</title>
    <!-- Font Awesome 6 (免费图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Microsoft YaHei', '微软雅黑', system-ui, -apple-system, 'Roboto', sans-serif;
        }

        /* 桌面背景 - Win11 风格 */
        .desktop {
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?q=80&w=2070&auto=format') center/cover no-repeat;
            position: relative;
            overflow: hidden;
        }

        /* 桌面图标容器 */
        .desktop-icons {
            position: absolute;
            top: 30px;
            left: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 85px;
            cursor: pointer;
            padding: 8px 4px;
            border-radius: 12px;
            transition: transform 0.2s ease, background 0.2s;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.4);
        }

        .desktop-icon:hover {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            transform: scale(1.02);
        }

        .desktop-icon i {
            font-size: 36px;
            margin-bottom: 6px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .desktop-icon span {
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 2px 8px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }

        /* 任务栏 */
        .taskbar {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: auto;
            max-width: 95%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px);
            border-radius: 28px;
            padding: 6px 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255,255,255,0.5);
            z-index: 1000;
        }

        .taskbar-left, .taskbar-center, .taskbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .taskbar-center {
            gap: 20px;
        }

        .taskbar-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-size: 20px;
            color: #1f1f1f;
        }

        .taskbar-icon:hover {
            background: rgba(0, 0, 0, 0.1);
            transform: scale(1.05);
        }

        .taskbar-icon:active {
            transform: scale(0.95);
        }

        .start-btn {
            background: rgba(0, 120, 212, 0.2);
            cursor: default;
        }
        .start-btn:hover {
            background: rgba(0, 120, 212, 0.2);
            transform: none;
        }

        .taskbar-right {
            margin-left: 20px;
            gap: 8px;
        }

        .time-area {
            background: rgba(0,0,0,0.05);
            border-radius: 12px;
            padding: 6px 12px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
        }

        .time-area:hover {
            background: rgba(0,0,0,0.15);
        }

        /* 窗口 */
        .windows-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 200;
        }

        .window {
            position: absolute;
            background: rgba(245, 245, 250, 0.85);
            backdrop-filter: blur(25px);
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.4);
            min-width: 280px;
            min-height: 220px;
            resize: both;
            overflow: hidden;
        }

        .window.active {
            z-index: 1000;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.4);
        }

        .title-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(255,255,255,0.5);
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            cursor: grab;
        }

        .title-bar:active {
            cursor: grabbing;
        }

        .window-title {
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .window-controls {
            display: flex;
            gap: 10px;
        }

        .window-controls span {
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 14px;
        }

        .window-controls span:hover {
            background: rgba(0,0,0,0.15);
        }

        .close-btn:hover {
            background: #e81123 !important;
            color: white;
        }

        .window-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.5;
        }

        .resize-handle {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 20px;
            height: 20px;
            cursor: nw-resize;
            background: radial-gradient(circle at 100% 100%, rgba(0,0,0,0.2) 2px, transparent 2px);
            border-bottom-right-radius: 16px;
            pointer-events: auto;
        }

        /* 日历浮窗 */
        .calendar-popup {
            position: absolute;
            bottom: 65px;
            right: 30px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 15px;
            width: 260px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            z-index: 1200;
            display: none;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .calendar-popup.show {
            display: block;
        }

        .calendar-header {
            font-weight: bold;
            text-align: center;
            margin-bottom: 12px;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            text-align: center;
        }

        .drive-item, .file-item {
            padding: 8px;
            margin: 6px 0;
            background: rgba(255,255,240,0.4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        hr {
            margin: 12px 0;
        }
        /* 案件描述样式 - 用于文本文档窗口 */
        .case-description {
            background: rgba(0,0,0,0.03);
            padding: 12px;
            border-radius: 16px;
            white-space: pre-wrap;
            font-family: inherit;
        }
    </style>
</head>
<body>
<div class="desktop">
    <!-- 桌面图标：删除了“此电脑”，保留 Edge浏览器、文本文档、警局档案系统 -->
    <div class="desktop-icons">
        <div class="desktop-icon" data-app="edge">
            <i class="fab fa-edge"></i>
            <span>Cococola浏览器</span>
        </div>
        <div class="desktop-icon" data-app="textdoc">
            <i class="fas fa-file-alt"></i>
            <span>文本文档</span>
        </div>
        <!-- 警局档案系统：使用浏览器图标 (globe)，点击打开新标签页到 dangan.html -->
        <div class="desktop-icon" data-app="police">
            <i class="fas fa-globe"></i>
            <span>警局档案系统</span>
        </div>
    </div>

    <!-- 窗口容器 -->
    <div class="windows-container" id="windowsContainer"></div>

    <!-- 任务栏（开始按钮无反应） -->
    <div class="taskbar">
        <div class="taskbar-left">
            <div class="taskbar-icon start-btn" id="startBtn">
                <i class="fab fa-windows"></i>
            </div>
        </div>
        <div class="taskbar-center">
            <div class="taskbar-icon" id="searchIcon"><i class="fas fa-search"></i></div>
            <div class="taskbar-icon" id="taskViewIcon"><i class="fas fa-window-restore"></i></div>
            <div class="taskbar-icon" id="widgetIcon"><i class="fas fa-chart-simple"></i></div>
        </div>
        <div class="taskbar-right">
            <div class="taskbar-icon"><i class="fas fa-wifi"></i></div>
            <div class="taskbar-icon"><i class="fas fa-volume-up"></i></div>
            <div class="taskbar-icon"><i class="fas fa-keyboard"></i></div>
            <div class="time-area" id="timeDisplay">--:--</div>
        </div>
    </div>

    <!-- 日历浮窗 -->
    <div class="calendar-popup" id="calendarPopup">
        <div class="calendar-header" id="calendarMonthYear"></div>
        <div class="calendar-days" id="calendarDays"></div>
    </div>
</div>

<script>
    // ---------- 全局变量 ----------
    let windowZCounter = 1000;       
    let currentActiveWindow = null;

    // 随机偏移避免重叠（仅用于其他窗口，但当前只有文本文档窗口会调用，而文本文档单独处理居中，此函数保留备用）
    function getRandomOffset() {
        return { x: 30 + Math.random() * 200, y: 50 + Math.random() * 180 };
    }

    // 获取窗口内容（根据应用类型）
    function getWindowContent(appType) {
        switch(appType) {
            case 'textdoc':
                // 文本文档内容替换为完整的案件描述文案
                return `<div class="case-description">
                            <strong><i class="fas fa-file-alt"></i> 案件记录_20260416.txt</strong>
                            <div style="margin-top:12px;">
                                凌晨四点十七分，城南河道的薄雾还未散去，只有清淤吊车的轰鸣声划破死寂。铁桶被钢索缓缓拽出水面时，桶壁的水泥早已开裂，浑浊的河水顺着裂缝反复冲刷，带走了时间的痕迹，也留下了无法掩盖的秘密。<br><br>
                                切割机的刺耳声响持续了许久，火星在晨雾中零星闪烁，像是在强行撕开一段被尘封的过往。我站在三米开外，口罩紧紧捂住口鼻，橡胶手套早已穿戴整齐，指尖能感受到布料下的紧绷。身后的警戒线被晚风卷得啪啪作响，每一声都像倒计时的鼓点，敲在人心上。<br><br>
                                当铁桶的封盖被彻底切开，一股混杂着腐败与河水腥气的味道瞬间扑面而来，先于任何视觉冲击，攫住了所有呼吸。桶内是一具腐败严重的尸体，面部早已无法辨认，仅能初步判定为女性，具体年龄需等待实验室的进一步检测。<br><br>
                                衣物残片粘连在躯体上，一片模糊的深色若隐若现，分不清是暗红还是深棕，像是被岁月和河水褪尽了原本的模样。我的目光最终定格在她的右手食指——一枚银色戒指牢牢套在指根，戒指下方，一道浅浅的伤疤旁，隐约能看到一个飞鸟纹身的轮廓。戒指内刻着SS。我只能通过警局档案系统和浏览器查找信息，有些同样的搜索词在不同的系统里能搜出不同的东西，以此来拼凑出无声的证言。不如就从SS开始查起。
                            </div>
                        </div>`;
            default:
                return `<div>窗口内容占位</div>`;
        }
    }

    // 创建窗口 (支持拖动/调整大小/最大化)
    // 新增参数 centerFlag，若为 true 则窗口居中显示
    function createWindow(appType, title, width = 580, height = 540, center = false) {
        const container = document.getElementById('windowsContainer');
        let left, top;
        if (center) {
            // 计算居中位置
            left = (window.innerWidth - width) / 2;
            top = (window.innerHeight - height) / 2;
            // 确保不超出边界
            left = Math.max(10, Math.min(left, window.innerWidth - width - 10));
            top = Math.max(10, Math.min(top, window.innerHeight - height - 60));
        } else {
            const offset = getRandomOffset();
            left = Math.min(window.innerWidth - width - 30, Math.max(20, offset.x));
            top = Math.min(window.innerHeight - 120, Math.max(30, offset.y));
        }
        
        const windowId = 'win_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        const winDiv = document.createElement('div');
        winDiv.className = 'window';
        winDiv.id = windowId;
        winDiv.style.left = left + 'px';
        winDiv.style.top = top + 'px';
        winDiv.style.width = width + 'px';
        winDiv.style.height = height + 'px';
        winDiv.style.zIndex = windowZCounter++;
        
        let titleIcon = 'fas fa-file-alt';
        
        winDiv.innerHTML = `
            <div class="title-bar">
                <div class="window-title"><i class="${titleIcon}"></i> ${title}</div>
                <div class="window-controls">
                    <span class="max-btn"><i class="fas fa-square"></i></span>
                    <span class="close-btn"><i class="fas fa-times"></i></span>
                </div>
            </div>
            <div class="window-content">${getWindowContent(appType)}</div>
            <div class="resize-handle"></div>
        `;
        container.appendChild(winDiv);

        // 交互逻辑
        const titleBar = winDiv.querySelector('.title-bar');
        const closeBtn = winDiv.querySelector('.close-btn');
        const maxBtn = winDiv.querySelector('.max-btn');
        const resizeHandle = winDiv.querySelector('.resize-handle');
        let isMaximized = false;
        let savedRect = { left: left, top: top, width: width, height: height };

        function bringToFront(el) {
            el.style.zIndex = windowZCounter++;
            if (currentActiveWindow) currentActiveWindow.classList.remove('active');
            currentActiveWindow = el;
            currentActiveWindow.classList.add('active');
        }

        winDiv.addEventListener('mousedown', (e) => {
            if (e.target === closeBtn || e.target === maxBtn || e.target.closest('.max-btn') || e.target.closest('.close-btn')) return;
            bringToFront(winDiv);
        });

        closeBtn.addEventListener('click', () => {
            winDiv.remove();
        });

        maxBtn.addEventListener('click', () => {
            if (!isMaximized) {
                savedRect = {
                    left: parseInt(winDiv.style.left),
                    top: parseInt(winDiv.style.top),
                    width: winDiv.offsetWidth,
                    height: winDiv.offsetHeight
                };
                const taskbarHeight = 70;
                winDiv.style.left = '0px';
                winDiv.style.top = '0px';
                winDiv.style.width = '100%';
                winDiv.style.height = `calc(100% - ${taskbarHeight}px)`;
                winDiv.style.borderRadius = '0';
                isMaximized = true;
                maxBtn.innerHTML = '<i class="fas fa-window-restore"></i>';
            } else {
                winDiv.style.left = savedRect.left + 'px';
                winDiv.style.top = savedRect.top + 'px';
                winDiv.style.width = savedRect.width + 'px';
                winDiv.style.height = savedRect.height + 'px';
                winDiv.style.borderRadius = '16px';
                isMaximized = false;
                maxBtn.innerHTML = '<i class="fas fa-square"></i>';
            }
        });

        // 拖动标题栏
        let dragActive = false;
        titleBar.addEventListener('mousedown', (e) => {
            if (e.target.closest('.window-controls')) return;
            if (isMaximized) return;
            e.preventDefault();
            dragActive = true;
            const startX = e.clientX;
            const startY = e.clientY;
            const startLeft = parseInt(winDiv.style.left);
            const startTop = parseInt(winDiv.style.top);
            const onMouseMove = (moveEvent) => {
                if (!dragActive) return;
                const dx = moveEvent.clientX - startX;
                const dy = moveEvent.clientY - startY;
                let newLeft = startLeft + dx;
                let newTop = startTop + dy;
                newLeft = Math.min(window.innerWidth - winDiv.offsetWidth + 10, Math.max(-10, newLeft));
                newTop = Math.min(window.innerHeight - 80, Math.max(0, newTop));
                winDiv.style.left = newLeft + 'px';
                winDiv.style.top = newTop + 'px';
            };
            const onMouseUp = () => {
                dragActive = false;
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            };
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        });

        // 右下角调整大小
        resizeHandle.addEventListener('mousedown', (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (isMaximized) return;
            const startX = e.clientX;
            const startY = e.clientY;
            const startW = winDiv.offsetWidth;
            const startH = winDiv.offsetHeight;
            const onResizeMove = (moveEv) => {
                let newW = startW + (moveEv.clientX - startX);
                let newH = startH + (moveEv.clientY - startY);
                newW = Math.max(280, Math.min(window.innerWidth - parseInt(winDiv.style.left) - 10, newW));
                newH = Math.max(200, Math.min(window.innerHeight - parseInt(winDiv.style.top) - 60, newH));
                winDiv.style.width = newW + 'px';
                winDiv.style.height = newH + 'px';
            };
            const onResizeUp = () => {
                document.removeEventListener('mousemove', onResizeMove);
                document.removeEventListener('mouseup', onResizeUp);
            };
            document.addEventListener('mousemove', onResizeMove);
            document.addEventListener('mouseup', onResizeUp);
        });

        bringToFront(winDiv);
        return winDiv;
    }

    // ----- 桌面图标点击处理 -----
    document.querySelectorAll('.desktop-icon').forEach(icon => {
        icon.addEventListener('click', (e) => {
            e.stopPropagation();
            const app = icon.getAttribute('data-app');
            if (app === 'edge') {
                // 打开新标签页到 cococola.html (无弹窗)
                window.open('cococola.html', '_blank');
            }
            else if (app === 'textdoc') {
                // 文本文档窗口，居中显示，尺寸稍大以容纳文本
                createWindow('textdoc', '文本文档 - 案件记录', 600, 560, true);
            }
            else if (app === 'police') {
                // 警局档案系统：打开新标签页到 dangan.html (相对路径)
                window.open('dangan.html', '_blank');
            }
        });
    });

    // ----- 开始按钮：无任何反应 -----
    const startBtn = document.getElementById('startBtn');
    if (startBtn) {
        startBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            // 完全无动作
            return false;
        });
    }

    // ----- 任务栏其他图标：移除所有弹窗（静默）-----
    const searchIcon = document.getElementById('searchIcon');
    const taskViewIcon = document.getElementById('taskViewIcon');
    const widgetIcon = document.getElementById('widgetIcon');
    if (searchIcon) searchIcon.addEventListener('click', () => { console.log("搜索"); });
    if (taskViewIcon) taskViewIcon.addEventListener('click', () => { console.log("多任务视图"); });
    if (widgetIcon) widgetIcon.addEventListener('click', () => { console.log("小工具"); });
    
    const rightIcons = document.querySelectorAll('.taskbar-right .taskbar-icon');
    rightIcons.forEach(icon => {
        if (!icon.classList.contains('time-area')) {
            icon.addEventListener('click', (e) => {
                e.stopPropagation();
                console.log("托盘图标");
            });
        }
    });

    // ----- 时间与日历浮窗 (无弹窗)-----
    const timeDisplay = document.getElementById('timeDisplay');
    const calendarPopup = document.getElementById('calendarPopup');
    
    function updateTime() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2,'0');
        const minutes = now.getMinutes().toString().padStart(2,'0');
        timeDisplay.innerText = `${hours}:${minutes}`;
    }
    setInterval(updateTime, 1000);
    updateTime();

    timeDisplay.addEventListener('click', (e) => {
        e.stopPropagation();
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth();
        const date = now.getDate();
        const monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
        document.getElementById('calendarMonthYear').innerText = `${year}年 ${monthNames[month]}`;
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month+1, 0).getDate();
        let daysHtml = '';
        for(let i=0; i<firstDay; i++) daysHtml += `<div></div>`;
        for(let d=1; d<=daysInMonth; d++) {
            let activeClass = (d === date) ? 'style="background:#0078d4; color:white; border-radius:50%;"' : '';
            daysHtml += `<div ${activeClass}>${d}</div>`;
        }
        document.getElementById('calendarDays').innerHTML = daysHtml;
        calendarPopup.classList.toggle('show');
    });
    
    document.addEventListener('click', (e) => {
        if (!timeDisplay.contains(e.target) && calendarPopup.classList.contains('show')) {
            calendarPopup.classList.remove('show');
        }
    });

    // 窗口点击前置
    document.getElementById('windowsContainer').addEventListener('mousedown', (e) => {
        const win = e.target.closest('.window');
        if (win) {
            const curZ = parseInt(win.style.zIndex);
            if (curZ < windowZCounter) {
                win.style.zIndex = windowZCounter++;
                if (currentActiveWindow) currentActiveWindow.classList.remove('active');
                currentActiveWindow = win;
                currentActiveWindow.classList.add('active');
            }
        }
    });

    console.log("Win11风格桌面已启动 - 文本文档窗口已居中，此电脑图标已删除");
</script>
</body>
</html>
